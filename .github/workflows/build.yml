name: Build TakeOS

on:
  # Construye automaticamente cada dia a las 6am UTC
  # (detecta actualizaciones de Bazzite y las incorpora)
  schedule:
    - cron: "0 6 * * *"

  # Construye cuando hay cambios en el repo (excepto .md)
  push:
    paths-ignore:
      - "**.md"

  # Permite correr el build manualmente desde GitHub
  workflow_dispatch:

jobs:
  build:
    name: Build TakeOS Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Maximizar espacio en disco
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir y publicar imagen TakeOS
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Containerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/takeos:latest
            ghcr.io/${{ github.repository_owner }}/takeos:stable
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
