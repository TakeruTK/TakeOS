name: Build TakeOS

on:
  schedule:
    - cron: "0 6 * * *"
  push:
    paths-ignore:
      - "**.md"
  workflow_dispatch:

jobs:
  build:
    name: Build TakeOS Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Maximizar espacio en disco
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir y publicar imagen TakeOS
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          docker buildx build \
            --platform linux/amd64 \
            --tag ghcr.io/${OWNER}/takeos:latest \
            --tag ghcr.io/${OWNER}/takeos:stable \
            --file ./Containerfile \
            --push \
            .
