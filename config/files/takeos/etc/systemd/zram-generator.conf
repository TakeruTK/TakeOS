# TakeOS — Configuración de zRAM
# zRAM crea un dispositivo de swap comprimido en la propia RAM.
# En un sistema con 4GB, esto simula ~6GB de RAM efectiva.
# Algoritmo zstd: mejor ratio de compresion con bajo impacto en CPU.

[zram0]
zram-size = ram / 2
compression-algorithm = zstd
swap-priority = 100
fs-type = swap
