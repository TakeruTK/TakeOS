# TakeOS — Parámetros de kernel para hardware de bajo presupuesto
# Optimizado para sistemas con 4-8GB RAM y GPU integrada

# ── Gestión de memoria ────────────────────────────────────────────────────────
# Baja agresividad del swap (prefiere RAM comprimida via zram)
vm.swappiness = 10

# Reduce presión sobre el caché del sistema de archivos
vm.vfs_cache_pressure = 50

# El kernel espera más antes de escribir datos sucios al disco
vm.dirty_ratio = 20
vm.dirty_background_ratio = 5

# ── Rendimiento gaming ────────────────────────────────────────────────────────
# Reduce latencia de planificador para mayor responsividad en juegos
kernel.sched_migration_cost_ns = 5000000
kernel.sched_autogroup_enabled = 1

# ── Red ───────────────────────────────────────────────────────────────────────
# Mejora throughput de red (útil en juegos online)
net.core.netdev_max_backlog = 4096
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
